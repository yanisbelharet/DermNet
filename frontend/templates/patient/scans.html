{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DermNet — Mes Analyses</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=Geist:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F0EDE6;--bg2:#E8E4DC;--card:#FAFAF7;--sage:#5C7A62;--sage-lt:#D6E8D8;--sage-mid:#8FAF94;--dark:#1E2A22;--dark2:#2D3D32;--text:#2C3830;--text2:#6B7B6E;--text3:#9AADA0;--border:#DDD9D0;--border2:#C8C3B8;--red:#C85A4A;--red-lt:#F5E8E6;--amber:#B8813A;--amber-lt:#F5ECD8;--white:#FFFFFF;--radius:12px;--radius-lg:20px;--radius-sm:8px}
body{font-family:'Geist',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-leaf{width:32px;height:32px;background:var(--sage);border-radius:9px;display:flex;align-items:center;justify-content:center}
.nav-leaf svg{width:18px;height:18px;fill:white}
.nav-name{font-family:'Fraunces',serif;font-size:18px;font-weight:400;color:var(--text);letter-spacing:-0.3px;line-height:1}
.nav-sub{font-size:10px;color:var(--text3);margin-top:1px}
.nav-links{display:flex;align-items:center;gap:6px}
.nav-link{font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;padding:6px 14px;border-radius:20px;transition:all .15s}
.nav-link:hover{background:var(--bg2);color:var(--text)}
.nav-link.active{background:var(--sage-lt);color:var(--sage)}
.nav-right{display:flex;align-items:center;gap:12px}
.lang-sw{display:flex;background:var(--bg2);border-radius:20px;padding:3px}
.lang-btn{font-family:'Geist',sans-serif;font-size:11px;font-weight:500;padding:4px 12px;border:none;border-radius:16px;cursor:pointer;background:transparent;color:var(--text3);transition:all .2s}
.lang-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--sage-lt);border:2px solid var(--sage-mid);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--sage);cursor:pointer;position:relative}
.avatar-dot{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:#5CB87A;border:2px solid var(--card)}
main{max-width:1100px;margin:0 auto;padding:40px 40px 80px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page-header{margin-bottom:28px;animation:fadeUp .4s ease both}
.page-title{font-family:'Fraunces',serif;font-size:28px;font-weight:300;color:var(--text);letter-spacing:-0.4px;margin-bottom:4px}
.page-title em{font-style:italic;color:var(--sage)}
.page-sub{font-size:13px;color:var(--text3)}
.filters{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap;animation:fadeUp .4s .05s ease both}
.filter-btn{font-family:'Geist',sans-serif;font-size:12px;font-weight:500;padding:7px 16px;border:1.5px solid var(--border);border-radius:20px;background:var(--card);color:var(--text2);cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--sage-mid);color:var(--sage)}
.filter-btn.active{background:var(--sage-lt);border-color:var(--sage);color:var(--sage)}
.search-wrap{position:relative;margin-left:auto}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:var(--text3)}
.search-inp{height:36px;padding:0 14px 0 34px;border:1.5px solid var(--border);border-radius:20px;font-family:'Geist',sans-serif;font-size:12px;color:var(--text);background:var(--card);outline:none;width:200px;transition:border-color .18s}
.search-inp:focus{border-color:var(--sage)}
.search-inp::placeholder{color:var(--text3)}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;animation:fadeUp .4s .1s ease both}
table{width:100%;border-collapse:collapse}
thead th{padding:13px 20px;text-align:left;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--bg2);border-bottom:1px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s}
tbody tr:last-child{border:none}
tbody tr:hover{background:#F5F7F5}
tbody td{padding:14px 20px;font-size:13px;color:var(--text);vertical-align:middle}
.scan-diag{color:var(--text2)}
.conf-wrap{display:flex;align-items:center;gap:8px}
.conf-bar{width:60px;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.conf-fill{height:100%;background:var(--sage);border-radius:2px}
.conf-pct{font-size:12px;color:var(--text2);min-width:32px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
.badge-green{background:#EBF5EC;color:#2E7D42}
.badge-amber{background:var(--amber-lt);color:#8B5E10}
.danger-tag{display:inline-flex;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:500}
.danger-high{background:var(--red-lt);color:var(--red)}
.danger-mid{background:var(--amber-lt);color:var(--amber)}
.danger-low{background:var(--sage-lt);color:var(--sage)}
.danger-none{background:var(--bg2);color:var(--text3)}
.action-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;font-family:'Geist',sans-serif;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s}
.action-btn:hover{border-color:var(--sage-mid);color:var(--sage);background:var(--sage-lt)}
.action-btn svg{width:12px;height:12px}
.empty{text-align:center;padding:60px 20px;color:var(--text3)}
.empty svg{width:36px;height:36px;margin:0 auto 12px;display:block;color:var(--border2)}
.empty p{font-size:13px}
/* Modal */
.overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(30,42,34,.4);align-items:center;justify-content:center;padding:24px}
.overlay.show{display:flex}
.modal{background:var(--card);border-radius:var(--radius-lg);border:1px solid var(--border);width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.22,1,.36,1) both}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.modal-head{padding:24px 28px 0;display:flex;align-items:flex-start;justify-content:space-between}
.modal-title{font-family:'Fraunces',serif;font-size:20px;font-weight:300;color:var(--text);letter-spacing:-0.3px}
.modal-close{background:var(--bg2);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:background .15s}
.modal-close:hover{background:var(--border)}
.modal-close svg{width:15px;height:15px}
.modal-body{padding:20px 28px 28px}
.m-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.m-stat{background:var(--bg);border-radius:var(--radius-sm);padding:12px 14px}
.m-label{font-size:11px;color:var(--text3);margin-bottom:4px}
.m-val{font-size:14px;font-weight:500;color:var(--text)}
.gauge-wrap{margin-bottom:16px}
.gauge-lbl{font-size:12px;color:var(--text2);margin-bottom:8px;font-weight:500}
.gauge-bar{height:8px;background:var(--bg2);border-radius:4px;overflow:hidden}
.gauge-fill{height:100%;border-radius:4px;background:var(--sage);transition:width 1s ease}
.tc-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.tc-item:last-child{border:none}
.tc-name{flex:1;color:var(--text2)}
.tc-pct{font-weight:500;color:var(--text);min-width:36px;text-align:right}
.tc-bar{flex:2;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden}
.tc-fill{height:100%;background:var(--sage-mid);border-radius:2px}
.rx-box{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-top:16px}
.rx-title{font-size:12px;font-weight:500;color:var(--text2);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.rx-title svg{width:14px;height:14px;color:var(--sage)}
.rx-text{font-size:13px;color:var(--text);line-height:1.6}
.rx-empty{font-size:12px;color:var(--text3);font-style:italic}
@media(max-width:700px){nav{padding:0 20px}main{padding:24px 20px 60px}.nav-links{display:none}thead th,tbody td{padding:10px 12px}}
</style>
</head>
<body>
<nav>
  <a href="patient.html" class="nav-logo">
    <div class="nav-leaf"><svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 19.34L5.71 21l1-1c.93.93 2.17 1 3 1 4 0 6-2 10-8 1.93-3-1-7-2.71-5zM11 11c0 0 1-1 3.5-1.5C13.5 12 13 13 11 13v-2z"/></svg></div>
    <div><div class="nav-name">DermNet</div><div class="nav-sub" data-fr="Portail Patient" data-en="Patient Portal">Portail Patient</div></div>
  </a>
  <div class="nav-links">
    <a href="/patient/dashboard/" class="nav-link" data-fr="Tableau de bord" data-en="Dashboard">Tableau de bord</a>
    <a href="scans.html" class="nav-link active" data-fr="Mes analyses" data-en="My Scans">Mes analyses</a>
    <a href="/patient/prescriptions/" class="nav-link" data-fr="Ordonnances" data-en="Prescriptions">Ordonnances</a>
    <a href="/patient/support/" class="nav-link" data-fr="Assistance" data-en="Support">Assistance</a>
  </div>
  <div class="nav-right">
    <div class="lang-sw"><button class="lang-btn active" onclick="setLang('fr')">FR</button><button class="lang-btn" onclick="setLang('en')">EN</button></div>
    <div class="avatar">SB<div class="avatar-dot"></div></div>
  </div>
</nav>
<main>
  <div class="page-header">
    <div class="page-title" data-fr="Mes <em>analyses</em>" data-en="My <em>scans</em>">Mes <em>analyses</em></div>
    <div class="page-sub" data-fr="Historique complet de vos analyses dermatologiques." data-en="Complete history of your dermatological scans.">Historique complet de vos analyses dermatologiques.</div>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="filterBy('all',this)" data-fr="Toutes" data-en="All">Toutes</button>
    <button class="filter-btn" onclick="filterBy('processed',this)" data-fr="Traitées" data-en="Processed">Traitées</button>
    <button class="filter-btn" onclick="filterBy('pending',this)" data-fr="En attente" data-en="Pending">En attente</button>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input class="search-inp" id="searchInp" placeholder="Rechercher…" oninput="buildTable()"/>
    </div>
  </div>
  <div class="table-card"><table><thead><tr>
    <th data-fr="ID" data-en="ID">ID</th>
    <th data-fr="Date" data-en="Date">Date</th>
    <th data-fr="Diagnostic IA" data-en="AI Diagnosis">Diagnostic IA</th>
    <th data-fr="Confiance" data-en="Confidence">Confiance</th>
    <th data-fr="Danger" data-en="Danger">Danger</th>
    <th data-fr="Statut" data-en="Status">Statut</th>
    <th data-fr="Action" data-en="Action">Action</th>
  </tr></thead><tbody id="tbody"></tbody></table></div>
</main>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title" id="mTitle">Scan</div>
      <button class="modal-close" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="m-row">
        <div class="m-stat"><div class="m-label" data-fr="Date" data-en="Date">Date</div><div class="m-val" id="mDate">—</div></div>
        <div class="m-stat"><div class="m-label" data-fr="Statut" data-en="Status">Statut</div><div class="m-val" id="mStatus">—</div></div>
      </div>
      <div class="gauge-wrap" id="mGaugeWrap">
        <div class="gauge-lbl" id="mGaugeLbl"></div>
        <div class="gauge-bar"><div class="gauge-fill" id="mGaugeFill" style="width:0%"></div></div>
      </div>
      <div id="mTc"></div>
      <div class="rx-box">
        <div class="rx-title"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12h6M9 16h6M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l5 5v11a2 2 0 0 1-2 2z"/></svg><span data-fr="Ordonnance" data-en="Prescription">Ordonnance</span></div>
        <div id="mRx"></div>
      </div>
    </div>
  </div>
</div>
<script>
let lang='fr',filter='all';
const data=[
  {id:4589,date:'Oct 26, 2024',status:'processed',diag:'Mélanome',conf:95,tc:[['Mélanome',95],['Nævus',3],['Kératose',2]],rx:{fr:'Dermocorticoïde classe III · 2×/jour pendant 14 jours\nConsultation dans 3 semaines.',en:'Class III corticosteroid · 2×/day for 14 days\nFollow-up in 3 weeks.'},danger:'high'},
  {id:4588,date:'Oct 25, 2024',status:'pending',diag:null,conf:null,tc:[],rx:null,danger:null},
  {id:4587,date:'Oct 24, 2024',status:'processed',diag:'Dermatite',conf:82,tc:[['Dermatite',82],['Eczéma',11],['Psoriasis',7]],rx:{fr:'Crème hydratante · 3×/jour\nAntihistaminique si prurit.',en:'Moisturizer · 3×/day\nAntihistamine if itching.'},danger:'low'},
  {id:4585,date:'Oct 22, 2024',status:'processed',diag:'Kératose séborrhéique',conf:88,tc:[['Kératose',88],['Verrue',8],['Nævus',4]],rx:{fr:'Acide salicylique 5% · 1×/jour\nRéévaluation dans 4 semaines.',en:'Salicylic acid 5% · 1×/day\nRe-evaluation in 4 weeks.'},danger:'mid'},
  {id:4583,date:'Oct 18, 2024',status:'processed',diag:'Eczéma',conf:76,tc:[['Eczéma',76],['Dermatite',18],['Psoriasis',6]],rx:{fr:'Tacrolimus 0.1% · 2×/jour pendant 21 jours.',en:'Tacrolimus 0.1% · 2×/day for 21 days.'},danger:'mid'},
];
const SM={fr:{processed:'Traité',pending:'En attente'},en:{processed:'Processed',pending:'Pending'}};
const DM={fr:{high:'ÉLEVÉ',mid:'MODÉRÉ',low:'FAIBLE'},en:{high:'HIGH',mid:'MODERATE',low:'LOW'}};
function filterBy(f,btn){filter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildTable();}
function buildTable(){
  const q=document.getElementById('searchInp').value.toLowerCase();
  const rows=data.filter(s=>(filter==='all'||s.status===filter)&&(!q||`${s.id}${s.date}${s.diag||''}`.toLowerCase().includes(q)));
  document.getElementById('tbody').innerHTML=rows.length?rows.map(s=>{
    const sl=SM[lang][s.status],sc=s.status==='processed'?'badge-green':'badge-amber';
    const dl=s.danger?DM[lang][s.danger]:'—',dc=s.danger?'danger-'+s.danger:'danger-none';
    const dg=s.diag||(lang==='fr'?'En cours…':'Analyzing…');
    const cf=s.conf?`<div class="conf-wrap"><div class="conf-bar"><div class="conf-fill" style="width:${s.conf}%"></div></div><span class="conf-pct">${s.conf}%</span></div>`:'<span style="color:var(--text3);font-size:12px">—</span>';
    return`<tr onclick="openModal(${s.id})"><td><strong>#${s.id}</strong></td><td>${s.date}</td><td class="scan-diag">${dg}</td><td>${cf}</td><td><span class="danger-tag ${dc}">${dl}</span></td><td><span class="badge ${sc}">${sl}</span></td><td><button class="action-btn" onclick="event.stopPropagation();openModal(${s.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>${lang==='fr'?'Voir':'View'}</button></td></tr>`;
  }).join(''):`<tr><td colspan="7"><div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><p>${lang==='fr'?'Aucune analyse trouvée.':'No scans found.'}</p></div></td></tr>`;
}
function openModal(id){
  const s=data.find(x=>x.id===id);
  document.getElementById('mTitle').textContent=`Scan #${s.id}`;
  document.getElementById('mDate').textContent=s.date;
  document.getElementById('mStatus').textContent=SM[lang][s.status];
  const gw=document.getElementById('mGaugeWrap'),gf=document.getElementById('mGaugeFill');
  gf.style.width='0%';
  if(s.status==='pending'){
    gw.style.display='none';
    document.getElementById('mTc').innerHTML='';
    document.getElementById('mRx').innerHTML=`<div class="rx-empty">${lang==='fr'?'Analyse en cours…':'Analysis in progress…'}</div>`;
  }
  else{
    gw.style.display='block';
    document.getElementById('mGaugeLbl').textContent=`${s.diag} · ${lang==='fr'?'Confiance IA':'AI Confidence'} : ${s.conf}%`;
    setTimeout(()=>{gf.style.width=s.conf+'%';},100);
    document.getElementById('mTc').innerHTML=s.tc.map(([n,p])=>`<div class="tc-item"><span class="tc-name">${n}</span><div class="tc-bar"><div class="tc-fill" style="width:${p}%"></div></div><span class="tc-pct">${p}%</span></div>`).join('');document.getElementById('mRx').innerHTML=s.rx?`<div class="rx-text">${s.rx[lang].replace(/\n/g,'<br>')}</div>`:`<div class="rx-empty">${lang==='fr'?'En attente.':'Pending.'}</div>`;
  }
  document.getElementById('overlay').classList.add('show');
}
function closeModal(e){
  if(!e||e.target===document.getElementById('overlay')){
    document.getElementById('overlay').classList.remove('show');
    document.getElementById('mGaugeFill').style.width='0%';
  }
}
function setLang(l){
  localStorage.setItem('dermnet_lang', l);
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim().toLowerCase()===l));
  document.querySelectorAll('[data-'+l+']').forEach(el=>el.innerHTML=el.getAttribute('data-'+l));
  document.getElementById('searchInp').placeholder=l==='fr'?'Rechercher…':'Search…';buildTable();
}

const savedLang = localStorage.getItem('dermnet_lang');
if (savedLang && savedLang !== 'fr') setLang(savedLang);

buildTable();
</script>
</body>
</html>
