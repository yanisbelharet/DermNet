<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DermNet — Ordonnances</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,400;1,300;1,400&family=Geist:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F0EDE6;--bg2:#E8E4DC;--card:#FAFAF7;--sage:#5C7A62;--sage-lt:#D6E8D8;--sage-mid:#8FAF94;--dark:#1E2A22;--dark2:#2D3D32;--text:#2C3830;--text2:#6B7B6E;--text3:#9AADA0;--border:#DDD9D0;--border2:#C8C3B8;--red:#C85A4A;--red-lt:#F5E8E6;--amber:#B8813A;--amber-lt:#F5ECD8;--white:#FFFFFF;--radius:12px;--radius-lg:20px;--radius-sm:8px}
body{font-family:'Geist',sans-serif;background:var(--bg);min-height:100vh;color:var(--text)}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 40px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-leaf{width:32px;height:32px;background:var(--sage);border-radius:9px;display:flex;align-items:center;justify-content:center}
.nav-leaf svg{width:18px;height:18px;fill:white}
.nav-name{font-family:'Fraunces',serif;font-size:18px;font-weight:400;color:var(--text);letter-spacing:-0.3px;line-height:1}
.nav-sub{font-size:10px;color:var(--text3);margin-top:1px}
.nav-links{display:flex;align-items:center;gap:6px}
.nav-link{font-size:13px;font-weight:500;color:var(--text2);text-decoration:none;padding:6px 14px;border-radius:20px;transition:all .15s}
.nav-link:hover{background:var(--bg2);color:var(--text)}
.nav-link.active{background:var(--sage-lt);color:var(--sage)}
.nav-right{display:flex;align-items:center;gap:12px}
.lang-sw{display:flex;background:var(--bg2);border-radius:20px;padding:3px}
.lang-btn{font-family:'Geist',sans-serif;font-size:11px;font-weight:500;padding:4px 12px;border:none;border-radius:16px;cursor:pointer;background:transparent;color:var(--text3);transition:all .2s}
.lang-btn.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--sage-lt);border:2px solid var(--sage-mid);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:500;color:var(--sage);cursor:pointer;position:relative}
.avatar-dot{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:#5CB87A;border:2px solid var(--card)}
main{max-width:900px;margin:0 auto;padding:40px 40px 80px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.page-header{margin-bottom:32px;animation:fadeUp .4s ease both}
.page-title{font-family:'Fraunces',serif;font-size:28px;font-weight:300;color:var(--text);letter-spacing:-0.4px;margin-bottom:4px}
.page-title em{font-style:italic;color:var(--sage)}
.page-sub{font-size:13px;color:var(--text3)}
.rx-list{display:flex;flex-direction:column;gap:16px;animation:fadeUp .4s .1s ease both}
.rx-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px 28px;display:grid;grid-template-columns:1fr auto;gap:20px;align-items:start;transition:border-color .18s}
.rx-card:hover{border-color:var(--sage-mid)}
.rx-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.rx-icon{width:40px;height:40px;border-radius:var(--radius-sm);background:var(--sage-lt);display:flex;align-items:center;justify-content:center}
.rx-icon svg{width:20px;height:20px;color:var(--sage)}
.rx-name{font-family:'Fraunces',serif;font-size:17px;font-weight:300;color:var(--text);letter-spacing:-0.3px}
.rx-date{font-size:11px;color:var(--text3);margin-top:2px}
.rx-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.meta-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--bg2);color:var(--text2)}
.rx-content{font-size:13px;color:var(--text2);line-height:1.7;border-left:2px solid var(--sage-lt);padding-left:14px}
.rx-doctor{font-size:11px;color:var(--text3);margin-top:10px}
.rx-actions{display:flex;flex-direction:column;gap:8px;align-items:flex-end}
.btn-download{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:transparent;font-family:'Geist',sans-serif;font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-download:hover{border-color:var(--sage);color:var(--sage);background:var(--sage-lt)}
.btn-download svg{width:13px;height:13px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.7}
.badge-green{background:#EBF5EC;color:#2E7D42}
.badge-amber{background:var(--amber-lt);color:#8B5E10}
@media(max-width:700px){nav{padding:0 20px}main{padding:24px 20px 60px}.nav-links{display:none}.rx-card{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav>
  <a href="patient.html" class="nav-logo">
    <div class="nav-leaf"><svg viewBox="0 0 24 24"><path d="M17 8C8 10 5.9 16.17 3.82 19.34L5.71 21l1-1c.93.93 2.17 1 3 1 4 0 6-2 10-8 1.93-3-1-7-2.71-5zM11 11c0 0 1-1 3.5-1.5C13.5 12 13 13 11 13v-2z"/></svg></div>
    <div><div class="nav-name">DermNet</div><div class="nav-sub" data-fr="Portail Patient" data-en="Patient Portal">Portail Patient</div></div>
  </a>
  <div class="nav-links">
    <a href="patient.html" class="nav-link" data-fr="Tableau de bord" data-en="Dashboard">Tableau de bord</a>
    <a href="scans.html" class="nav-link" data-fr="Mes analyses" data-en="My Scans">Mes analyses</a>
    <a href="prescriptions.html" class="nav-link active" data-fr="Ordonnances" data-en="Prescriptions">Ordonnances</a>
    <a href="support.html" class="nav-link" data-fr="Assistance" data-en="Support">Assistance</a>
  </div>
  <div class="nav-right">
    <div class="lang-sw"><button class="lang-btn active" onclick="setLang('fr')">FR</button><button class="lang-btn" onclick="setLang('en')">EN</button></div>
    <div class="avatar">SB<div class="avatar-dot"></div></div>
  </div>
</nav>
<main>
  <div class="page-header">
    <div class="page-title" data-fr="Mes <em>ordonnances</em>" data-en="My <em>prescriptions</em>">Mes <em>ordonnances</em></div>
    <div class="page-sub" data-fr="Toutes les ordonnances rédigées par votre dermatologue." data-en="All prescriptions written by your dermatologist.">Toutes les ordonnances rédigées par votre dermatologue.</div>
  </div>
  <div class="rx-list" id="rxList"></div>
</main>
<script>
let lang='fr';
const rxData=[
  {id:1,diag:{fr:'Mélanome',en:'Melanoma'},date:'Oct 26, 2024',doctor:'Dr. Amira Hadjadj',danger:{fr:'ÉLEVÉ',en:'HIGH'},dangerCls:'badge-amber',status:'active',
   meds:[{fr:'Dermocorticoïde classe III',en:'Class III corticosteroid'},{fr:'Anti-inflammatoire oral',en:'Oral anti-inflammatory'}],
   instructions:{fr:'Appliquer 2×/jour pendant 14 jours sur la zone concernée. Éviter l\'exposition solaire. Consultation de suivi dans 3 semaines.',en:'Apply 2×/day for 14 days on the affected area. Avoid sun exposure. Follow-up in 3 weeks.'}},
  {id:2,diag:{fr:'Kératose séborrhéique',en:'Seborrheic keratosis'},date:'Oct 22, 2024',doctor:'Dr. Amira Hadjadj',danger:{fr:'MODÉRÉ',en:'MODERATE'},dangerCls:'badge-green',status:'active',
   meds:[{fr:'Acide salicylique 5%',en:'Salicylic acid 5%'}],
   instructions:{fr:'Application locale 1×/jour. Ne pas appliquer sur peau saine. Réévaluation dans 4 semaines.',en:'Local application 1×/day. Do not apply on healthy skin. Re-evaluation in 4 weeks.'}},
  {id:3,diag:{fr:'Eczéma',en:'Eczema'},date:'Oct 18, 2024',doctor:'Dr. Amira Hadjadj',danger:{fr:'MODÉRÉ',en:'MODERATE'},dangerCls:'badge-green',status:'completed',
   meds:[{fr:'Tacrolimus 0.1% crème',en:'Tacrolimus 0.1% cream'}],
   instructions:{fr:'Tacrolimus 0.1% crème · 2×/jour pendant 21 jours. Éviter chaleur excessive.',en:'Tacrolimus 0.1% cream · 2×/day for 21 days. Avoid excessive heat.'}},
];
const SL={fr:{active:'Active',completed:'Terminée'},en:{active:'Active',completed:'Completed'}};
function build(){
  document.getElementById('rxList').innerHTML=rxData.map(r=>`
  <div class="rx-card">
    <div>
      <div class="rx-header">
        <div class="rx-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 12h6M9 16h6M17 21H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l5 5v11a2 2 0 0 1-2 2z"/></svg></div>
        <div><div class="rx-name">${r.diag[lang]}</div><div class="rx-date">${r.date}</div></div>
      </div>
      <div class="rx-meta">
        ${r.meds.map(m=>`<span class="meta-tag">💊 ${m[lang]}</span>`).join('')}
      </div>
      <div class="rx-content">${r.instructions[lang]}</div>
      <div class="rx-doctor">${lang==='fr'?'Rédigée par':'Written by'} ${r.doctor}</div>
    </div>
    <div class="rx-actions">
      <span class="badge ${r.dangerCls}">${SL[lang][r.status]}</span>
      <button class="btn-download"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>${lang==='fr'?'Télécharger':'Download'}</button>
    </div>
  </div>`).join('');
}
function setLang(l){
  localStorage.setItem('dermnet_lang', l);
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.trim().toLowerCase()===l));
  document.querySelectorAll('[data-'+l+']').forEach(el=>el.innerHTML=el.getAttribute('data-'+l));
  build();
}

const savedLang = localStorage.getItem('dermnet_lang');
if (savedLang && savedLang !== 'fr') setLang(savedLang);
build();
</script>
</body>
</html>
